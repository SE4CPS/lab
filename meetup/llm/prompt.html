<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Prompt Builder</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
    background:#0e0e0e; color:#ccc;
    font-family:Arial,Helvetica,sans-serif;
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
}

/* ── header ── */
header {
    display:flex; align-items:center; gap:10px; flex-shrink:0;
    padding:10px 20px; background:#111; border-bottom:1px solid #1e1e1e;
}
header h1 { font-size:.88em; color:#eee; font-weight:normal; flex:1; }

.toggle { display:flex; gap:4px; }
.toggle button {
    padding:4px 14px; border-radius:4px; font-size:.74em;
    cursor:pointer; border:1px solid #333; background:#1a1a1a; color:#555;
}
.toggle button.active.android { background:#14532d; border-color:#22c55e; color:#86efac; }
.toggle button.active.ios     { background:#1e3a5f; border-color:#3b82f6; color:#93c5fd; }

.btn {
    padding:5px 14px; border-radius:4px; font-size:.74em;
    cursor:pointer; border:1px solid #333; background:#1a1a1a; color:#888;
}
.btn.copy { border-color:#a855f7; color:#d8b4fe; background:#160d24; }

/* ── layout ── */
.main { display:flex; flex:1; overflow:hidden; }

/* left */
.left { flex:1; display:flex; flex-direction:column; border-right:1px solid #1e1e1e; }
.pane { flex:1; display:flex; flex-direction:column; min-height:0; }
.pane + .pane { border-top:1px solid #1e1e1e; }
.pane-label {
    padding:5px 14px; font-size:.63em; color:#555;
    text-transform:uppercase; letter-spacing:.08em;
    background:#111; border-bottom:1px solid #1a1a1a; flex-shrink:0;
}
textarea {
    flex:1; background:#0d0d0d; color:#b8ccb8;
    font-family:monospace; font-size:.74em; line-height:1.65;
    border:none; padding:14px 16px; resize:none; outline:none; tab-size:2;
}
textarea:focus { background:#111; color:#ccc; }

/* right */
.right { flex:1; display:flex; flex-direction:column; min-height:0; }
.right-head {
    display:flex; align-items:center; gap:8px; flex-shrink:0;
    padding:5px 16px; background:#111; border-bottom:1px solid #1e1e1e;
}
.right-head span { font-size:.63em; color:#444; flex:1; text-transform:uppercase; letter-spacing:.08em; }
.prompt-wrap { flex:1; overflow-y:auto; padding:22px 26px; }
.prompt { font-family:monospace; font-size:.82em; line-height:1.9; white-space:pre-wrap; word-break:break-word; }
.sec     { color:#3d5a3d; }
.android { color:#86efac; }
.ios     { color:#93c5fd; }
.err     { color:#f87171; font-family:monospace; font-size:.78em; padding:16px 0; }

/* notice bar */
.notice {
    display:none; padding:6px 20px; background:#1a0a00; border-top:1px solid #3a1a00;
    font-size:.68em; color:#a05020; font-family:monospace; flex-shrink:0;
}
</style>
</head>
<body>

<header>
    <h1>Prompt Builder</h1>
    <div class="toggle">
        <button id="tab-android" class="active android" onclick="setPlatform('android')">Android</button>
        <button id="tab-ios"                            onclick="setPlatform('ios')">iOS</button>
    </div>
    <button class="btn copy" id="copy-btn" onclick="copyPrompt()">Copy</button>
</header>

<div class="main">
    <div class="left">
        <div class="pane">
            <div class="pane-label">base.json — edit to add sections</div>
            <textarea id="base-ed" spellcheck="false" oninput="render()"
                      placeholder='{"sections":{"sys":"…","ctx":"…","task":"…","fmt":"…"}}'></textarea>
        </div>
        <div class="pane">
            <div class="pane-label" id="ctx-label">android.ctx.json</div>
            <textarea id="ctx-ed" spellcheck="false" oninput="render()"
                      placeholder='{"role":"…","os":"…"}'></textarea>
        </div>
    </div>

    <div class="right">
        <div class="right-head">
            <span id="right-label">assembled prompt</span>
        </div>
        <div class="prompt-wrap">
            <div class="prompt" id="out"></div>
            <div class="err"    id="err" style="display:none"></div>
        </div>
    </div>
</div>

<div class="notice" id="notice">
    Files not loaded — run: <strong>python -m http.server</strong> then open http://localhost:8000/prompt.html
</div>

<script>
let platform = 'android';

// ── fetch JSON from disk (requires a local server) ─────────────────────────
async function loadFile(path) {
    try {
        const r = await fetch(path, { cache: 'no-store' });
        if (!r.ok) throw new Error();
        return await r.json();
    } catch {
        return null;
    }
}

// ── helpers ────────────────────────────────────────────────────────────────
function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fillHtml(text, ctx, cls) {
    let out = esc(text);
    for (const [k, v] of Object.entries(ctx))
        out = out.split(`{{${k}}}`).join(`<span class="${cls}">${esc(String(v))}</span>`);
    return out;
}
function fillPlain(text, ctx) {
    for (const [k, v] of Object.entries(ctx))
        text = text.split(`{{${k}}}`).join(String(v));
    return text;
}

// ── render ─────────────────────────────────────────────────────────────────
function render() {
    const out = document.getElementById('out');
    const err = document.getElementById('err');
    try {
        const base = JSON.parse(document.getElementById('base-ed').value);
        const ctx  = JSON.parse(document.getElementById('ctx-ed').value);
        out.innerHTML = Object.entries(base.sections)
            .map(([k, v]) =>
                `<span class="sec"># ${k.toUpperCase()}</span>\n${fillHtml(v, ctx, platform)}`)
            .join('\n\n');
        out.style.display = 'block';
        err.style.display = 'none';
    } catch(e) {
        out.style.display = 'none';
        err.textContent   = 'JSON error: ' + e.message;
        err.style.display = 'block';
    }
}

// ── platform switch ────────────────────────────────────────────────────────
async function setPlatform(p) {
    platform = p;
    document.getElementById('tab-android').className = p==='android' ? 'active android' : '';
    document.getElementById('tab-ios').className     = p==='ios'     ? 'active ios'     : '';
    document.getElementById('ctx-label').textContent = p + '.ctx.json';
    document.getElementById('right-label').textContent = p + ' · assembled prompt';

    const ctx = await loadFile(p + '.ctx.json');
    if (ctx) document.getElementById('ctx-ed').value = JSON.stringify(ctx, null, 2);
    render();
}

// ── copy plain text ────────────────────────────────────────────────────────
function copyPrompt() {
    try {
        const base = JSON.parse(document.getElementById('base-ed').value);
        const ctx  = JSON.parse(document.getElementById('ctx-ed').value);
        const text = Object.entries(base.sections)
            .map(([k, v]) => `# ${k.toUpperCase()}\n${fillPlain(v, ctx)}`)
            .join('\n\n');
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 1500);
        });
    } catch { /* invalid JSON */ }
}

// ── init: load files from disk ─────────────────────────────────────────────
async function init() {
    const [base, ctx] = await Promise.all([
        loadFile('base.json'),
        loadFile('android.ctx.json'),
    ]);

    if (!base && !ctx) {
        document.getElementById('notice').style.display = 'block';
        return;
    }

    if (base) document.getElementById('base-ed').value = JSON.stringify(base, null, 2);
    if (ctx)  document.getElementById('ctx-ed').value  = JSON.stringify(ctx,  null, 2);
    render();
}

init();
</script>

</body>
</html>
